name: Build and Deploy Resume

on:
  push:
    paths:
      - "resume/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build English Resume
        uses: yamlresume/action@v0.2.2
        with:
          resumes: resume/resume-en.yml

      - name: Build Chinese Resume
        uses: yamlresume/action@v0.2.2
        with:
          resumes: resume/resume-cn.yml

      - name: Rename and commit generated files
        run: |
          mv resume/resume-en.html resume/en.html
          mv resume/resume-en.pdf  resume/en.pdf
          mv resume/resume-cn.html resume/cn.html
          mv resume/resume-cn.pdf  resume/cn.pdf
          sed -i '/<footer class="resume-footer">/,/<\/footer>/d' resume/en.html
          sed -i '/<footer class="resume-footer">/,/<\/footer>/d' resume/cn.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/en.html resume/en.pdf resume/cn.html resume/cn.pdf
          git commit -m "chore: update generated resume files"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: resume/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment