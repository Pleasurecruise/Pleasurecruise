        - 架构设计：Spring Boot + MyBatis 构建后端 RESTful API，Vue3 + Element Plus 开发管理后台，UniApp 实现微信小程序端
        - 权限系统：基于 JWT 的 RBAC 三级权限体系（管理员/普通用户/游客）
        - 性能优化：虚拟列表技术实现话题流流畅滚动；集成微信敏感词检测与阿里云 OSS 图片违规审核
        - 运营数据：GitHub 290+ Stars，累计用户 150+
      keywords:
        - Spring Boot
        - Vue3
        - UniApp

