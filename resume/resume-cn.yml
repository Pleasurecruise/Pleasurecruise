        - 集成 OpenAI、Anthropic、Google、xAI 等多家 AI 提供商，支持实时切换与流式响应
        - 内置插件系统与 MCP（Model Context Protocol）扩展架构，提供命令管理、历史导出（JSON/Markdown）等功能
      keywords:
        - TypeScript
        - Node.js
        - MCP

