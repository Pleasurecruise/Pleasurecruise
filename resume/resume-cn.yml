        - 使用 shadcn-vue 组件库与 lucide-vue-next 图标库，采用 Tailwind CSS 完成高还原度 UI 开发
        - 使用 Vue Router 实现页面导航，封装 Axios 拦截器统一处理请求转发与鉴权逻辑
        - 负责部署前后端测试环境，验证接口与接口文档一致性，解决跨域通信与联调调试问题
