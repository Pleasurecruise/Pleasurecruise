        - 对话导入与数据迁移：实现对话历史导入模块，稳定处理异构数据格式，优化本地存储与 UI 展示的数据一致性
        - UI/UX 稳定性提升：修复笔记排序与过滤、标签导航、拖拽排序等多项竞态和状态管理问题
        - 国际化与社区协作：为核心界面添加 i18n 支持，编写双语 API 文档与贡献指南，降低新贡献者上手门槛
      keywords:
